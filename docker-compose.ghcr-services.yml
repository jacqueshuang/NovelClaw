version: "3.8"

services:
  auth-portal:
    image: ghcr.io/${GHCR_OWNER:-your-ghcr-owner}/novelclaw-auth-portal:${IMAGE_TAG:-main}
    container_name: novelclaw-auth-portal
    ports:
      - "8010:8010"
    volumes:
      - ./apps/auth-portal/local_web_portal/data:/app/apps/auth-portal/local_web_portal/data
      - ./apps/auth-portal/.env:/app/apps/auth-portal/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - novelclaw-network

  multiagent:
    image: ghcr.io/${GHCR_OWNER:-your-ghcr-owner}/novelclaw-multiagent:${IMAGE_TAG:-main}
    container_name: novelclaw-multiagent
    ports:
      - "8011:8011"
    volumes:
      - ./apps/multiagent/local_web_portal/data:/app/apps/multiagent/local_web_portal/data
      - ./apps/multiagent/.env:/app/apps/multiagent/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - novelclaw-network

  novelclaw:
    image: ghcr.io/${GHCR_OWNER:-your-ghcr-owner}/novelclaw-workspace:${IMAGE_TAG:-main}
    container_name: novelclaw-workspace
    ports:
      - "8012:8012"
    volumes:
      - ./apps/novelclaw/local_web_portal/data:/app/apps/novelclaw/local_web_portal/data
      - ./apps/novelclaw/local_web_portal/runs:/app/apps/novelclaw/local_web_portal/runs
      - ./apps/novelclaw/.env:/app/apps/novelclaw/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - novelclaw-network

networks:
  novelclaw-network:
    driver: bridge
