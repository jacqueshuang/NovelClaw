# NovelClaw 统一入口 Nginx 配置示例。
# /            -> Auth Portal (127.0.0.1:8010)
# /multiagent/ -> MultiAgent (127.0.0.1:8011)
# /claw/       -> NovelClaw (127.0.0.1:8012)
server {
    # 对外访问域名；部署时替换为真实域名。
    server_name example.com;

    # 上传体积上限；可按你的附件与章节需求调整。
    client_max_body_size 50m;

    # 统一补全 /multiagent 末尾斜杠，避免相对路径与静态资源解析异常。
    location = /multiagent {
        return 301 /multiagent/;
    }

    # MultiAgent 工作台反向代理。
    location /multiagent/ {
        proxy_pass http://127.0.0.1:8011/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # 统一补全 /claw 末尾斜杠，避免相对路径与静态资源解析异常。
    location = /claw {
        return 301 /claw/;
    }

    # NovelClaw 工作台反向代理。
    location /claw/ {
        proxy_pass http://127.0.0.1:8012/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # 根路径入口反向代理到 Auth Portal。
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
